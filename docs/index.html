<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="DRIFT — Your code has a pulse. A real-time 3D visualization of your GitHub development life.">
  <title>DRIFT — Your Code Has a Pulse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="./assets/index-BNPatAfm.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-Bb2a6vI-.css">
</head>
<body>

  <!-- ═══ THREE.JS CANVAS ═══ -->
  <canvas id="drift-canvas"></canvas>
  <div class="vignette"></div>

  <!-- ═══ LANDING SCREEN ═══ -->
  <div id="landing" class="landing">
    <div class="landing-content">
      <div class="logo-mark">✦</div>
      <h1 class="brand">DRIFT</h1>
      <p class="tagline">Your code has a pulse</p>
      <div class="input-group">
        <input type="text" id="username-input" placeholder="GitHub username" autocomplete="off" spellcheck="false">
        <button id="launch-btn" class="btn-gold">Launch ✦</button>
      </div>
      <p class="hint">Enter any public GitHub profile to visualize their development universe</p>
    </div>
  </div>

  <!-- ═══ LOADING SCREEN ═══ -->
  <div id="loading" class="loading hidden">
    <div class="loading-content">
      <div class="loading-icon">✦</div>
      <p class="loading-text">Mapping universe...</p>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <p class="loading-detail" id="loading-detail">Fetching repositories...</p>
    </div>
  </div>

  <!-- ═══ HUD OVERLAY ═══ -->
  <div id="hud" class="hud hidden">
    <!-- Top-left: branding -->
    <div class="hud-brand">
      <span class="hud-logo">✦</span>
      <span class="hud-title">DRIFT</span>
      <span class="hud-user" id="hud-user"></span>
    </div>

    <!-- Top-right: stats -->
    <div class="hud-stats" id="hud-stats"></div>

    <!-- Bottom-center: controls -->
    <div class="hud-controls">
      <button class="btn-ghost btn-sm" id="btn-home" title="Reset view">⌂ Home</button>
      <button class="btn-ghost btn-sm" id="btn-share" title="Share card">📸 Share</button>
      <button class="btn-ghost btn-sm" id="btn-back" title="New user">← Back</button>
    </div>
  </div>

  <!-- ═══ TOOLTIP ═══ -->
  <div id="tooltip" class="tooltip hidden"></div>

  <!-- ═══ SHARE CARD MODAL ═══ -->
  <div id="share-modal" class="modal hidden">
    <div class="modal-panel">
      <div class="modal-header">
        <h2>✦ Share Your Universe</h2>
        <button class="modal-close" id="close-share">✕</button>
      </div>
      <canvas id="share-canvas" width="1200" height="630"></canvas>
      <div class="modal-actions">
        <button class="btn-gold" id="btn-copy-share">📋 Copy to Clipboard</button>
        <button class="btn-ghost" id="btn-download-share">⬇ Download PNG</button>
      </div>
    </div>
  </div>

  <!-- ═══ GALAXY DETAIL PANEL ═══ -->
  <div id="galaxy-panel" class="galaxy-panel hidden">
    <button class="panel-close" id="close-galaxy">✕</button>
    <div id="galaxy-detail"></div>
  </div>

  <!-- ═══ TOAST ═══ -->
  <div id="toast" class="toast hidden"></div>

</body>
</html>
